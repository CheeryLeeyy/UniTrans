        Ncams: 4

      postprocess:
        core_method: 'VoxelPostprocessor' # VoxelPostprocessor, BevPostprocessor supported
        gt_range: *cav_lidar
        voxel_size: [0.4, 0.4, 4]
        anchor_args:
          cav_lidar_range: *cav_lidar
          l: 3.9
          w: 1.6
          h: 1.56
          r: &anchor_yaw_m38 [0, 90]
          feature_stride: 2
          num: &anchor_num_m38 2
        target_args:
          pos_threshold: 0.6
          neg_threshold: 0.45
          score_threshold: 0.2
        order: 'hwl' # hwl or lwh
        max_num: 150 # maximum number of objects in a single frame. use this number to make sure different frames has the same dimension in the same batch
        nms_thresh: 0.15
        dir_args: &dir_args_m38
          dir_offset: 0.7853
          num_bins: 2
          anchor_yaw: *anchor_yaw_m38
    m39:
      sensor_type: &sensor_type_m39 'camera'
      core_method: &core_method_m39 "lift_splat_shoot"

      grid_conf: &grid_conf_m39
        xbound: [-51.2, 51.2, 0.4]   # Limit the range of the x direction and divide the grids
        ybound: [-51.2, 51.2, 0.4]   # Limit the range of the y direction and divide the grids
        zbound: [-10, 10, 20.0]   # Limit the range of the z direction and divide the grids
        ddiscr: [2, 50, 48]
        mode: 'LID'
      data_aug_conf: &data_aug_conf_m39
        resize_lim: [0.65, 0.7]
        final_dim: [384, 512]
        rot_lim: [-3.6, 3.6]
        H: 600
        W: 800
        rand_flip: False
        bot_pct_lim: [0.0, 0.05]
        cams: ['camera0', 'camera1', 'camera2', 'camera3']
        Ncams: 4

      # anchor box related
      postprocess:
        core_method: 'VoxelPostprocessor' # VoxelPostprocessor, BevPostprocessor supported
        gt_range: *cav_lidar
        voxel_size: [0.4, 0.4, 4]
        anchor_args:
          cav_lidar_range: *cav_lidar
          l: 3.9
          w: 1.6
          h: 1.56
          r: &anchor_yaw_m39 [0, 90]
          feature_stride: 2
          num: &anchor_num_m39 2
        target_args:
          pos_threshold: 0.6
          neg_threshold: 0.45
          score_threshold: 0.2
        order: 'hwl' # hwl or lwh
        max_num: 150 # maximum number of objects in a single frame. use this number to make sure different frames has the same dimension in the same batch
        nms_thresh: 0.15
        dir_args: &dir_args_m39
          dir_offset: 0.7853
          num_bins: 2
          anchor_yaw: *anchor_yaw_m39


