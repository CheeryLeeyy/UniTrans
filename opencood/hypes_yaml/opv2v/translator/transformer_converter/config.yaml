name: baseline_more_modality_transformer_converter
root_dir: "/dataset/OPV2V/train"
validate_dir: "/dataset/OPV2V/validate"
test_dir: "/dataset/OPV2V/test"

yaml_parsers:
  m4: "load_general_params"
  m7: "load_general_params"
  m2: "load_general_params"
  m9: "load_general_params"
  m5: "load_general_params"
  m11: "load_general_params"
  m12: "load_general_params"
  m14: "load_general_params"
  m15: "load_general_params"
  m17: "load_general_params"
  m6: "load_general_params"
  m8: "load_general_params"
  m10: "load_general_params"
  m13: "load_general_params"
  m16: "load_general_params"
  m18: "load_general_params"
  m19: "load_general_params"
  m20: "load_general_params"
  m24: "load_general_params"
  m25: "load_general_params"
  m26: "load_general_params"
  m30: "load_general_params"
  m31: "load_general_params"
  m32: "load_general_params"
  m1: "load_general_params"
  m3: "load_general_params"
  m36: "load_general_params"
  m37: "load_general_params"
  m38: "load_general_params"
  m39: "load_general_params"



train_params:
  batch_size: &batch_size 4
  epoches: 70
  eval_freq: 4
  save_freq: 4
  max_cav: 5

comm_range: 70
input_source: ['lidar', 'camera', 'depth']
label_type: 'lidar'
cav_lidar_range: &cav_lidar [-51.2, -51.2, -3, 51.2, 51.2, 1]
#cav_lidar_range: &cav_lidar [-102.4, -51.2, -3, 102.4, 51.2, 1]

add_data_extension: ['bev_visibility.png']

heter:
  assignment_path: "opencood/logs/heter_modality_assign/opv2v_4modality.json"    ###############
  ego_modality: &ego_modality "m4"
  mapping_dict:
    m1: m1
    m2: m2
    m3: m3
    m4: m4
    m7: m7
    m9: m9
    m5: m5
    m11: m11
    m12: m12
    m14: m14
    m15: m15
    m17: m17
    m6: m6
    m8: m8
    m10: m10
    m13: m13
    m16: m16
    m18: m18
    m19: m19
    m20: m20
    m24: m24
    m25: m25
    m26: m26
    m30: m30
    m31: m31
    m32: m32
    m36: m36
    m37: m37
    m38: m38
    m39: m39



  ego_sample_weight:
    m1: 6
    m3: 6
    m36: 6
    m37: 6
    m38: 6
    m39: 6

  neb_sample_weight:
    m1: 2
    m3: 2
    m36: 2
    m37: 2
    m38: 2
    m39: 2



  modality_setting:
    m4:
      sensor_type: &sensor_type_m4 'lidar'
      core_method: &core_method_m4 "point_pillar"

      # lidar requires preprocess
      preprocess:
        # options: BasePreprocessor, VoxelPreprocessor, BevPreprocessor
        core_method: 'SpVoxelPreprocessor'
        args:
          voxel_size: &voxel_size_m4 [0.4, 0.4, 4]
          max_points_per_voxel: 32
          max_voxel_train: 32000
          max_voxel_test: 70000
        # lidar range for each individual cav.
        cav_lidar_range: &cav_lidar_m4 [-51.2, -51.2, -3, 51.2, 51.2, 1]

      postprocess:
        core_method: 'VoxelPostprocessor' # VoxelPostprocessor, BevPostprocessor supported
        gt_range: *cav_lidar
        voxel_size: [0.4, 0.4, 4]
        anchor_args:
          cav_lidar_range: *cav_lidar
          l: 3.9
          w: 1.6
          h: 1.56
          r: &anchor_yaw_m4 [0, 90]
          feature_stride: 2
          num: &anchor_num_m4 2
        target_args:
          pos_threshold: 0.6
          neg_threshold: 0.45
          score_threshold: 0.2
        order: 'hwl' # hwl or lwh
        max_num: 150 # maximum number of objects in a single frame. use this number to make sure different frames has the same dimension in the same batch
        nms_thresh: 0.15
        dir_args: &dir_args_m4
          dir_offset: 0.7853
          num_bins: 2
          anchor_yaw: *anchor_yaw_m4
    m7:
      sensor_type: &sensor_type_m7 'lidar'
      core_method: &core_method_m7 "point_pillar"

      # lidar requires preprocess
      preprocess:
        # options: BasePreprocessor, VoxelPreprocessor, BevPreprocessor
        core_method: 'SpVoxelPreprocessor'
        args:
          voxel_size: &voxel_size_m7 [0.4, 0.4, 4]
